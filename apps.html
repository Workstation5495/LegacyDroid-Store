<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>Apps | Legacy Droid</title>
<link rel="stylesheet" href="holo.css">
</head>
<body>

<div class="ab">
  <h1 class="ab-title">APP REPOSITORY</h1>
  <span class="ab-meta">APK</span>
</div>

<nav class="nav">
  <a href="index.html">Home</a>
  <a href="catalog.html">Devices</a>
  <a href="software.html">Software</a>
  <a href="apps.html" class="on">Apps</a>
  <a href="games.html">Games</a>
</nav>

<div class="search-wrap">
  <input class="search-input" type="text" id="q" placeholder="Search apps..." oninput="filter()" onkeyup="filter()">
</div>
<div class="chips" id="chips"><span class="chip on" onclick="setCat('all',this)">All</span></div>
<div class="status" id="status">Loading...</div>

<div id="list" style="padding:6px 6px 0;"><div class="empty">Connecting to APK archive...</div></div>

<footer>
  <p>Support: <a href="https://t.me/Exynos2600">@Exynos2600</a> &nbsp;&#183;&nbsp; <a href="https://t.me/LegacyDroid">t.me/LegacyDroid</a></p>
  <p style="opacity:.4;font-size:11px;margin-top:6px;">Legacy Droid &copy; 2026</p>
</footer>

<script>
var data=[],cat='all';
function get(url,cb,err){
  if(window.fetch){fetch(url).then(function(r){if(!r.ok)throw 0;return r.json();}).then(cb).catch(err||function(){});}
  else{var x=new XMLHttpRequest();x.open('GET',url,true);x.onreadystatechange=function(){if(x.readyState===4){if(x.status===200){try{cb(JSON.parse(x.responseText));}catch(e){if(err)err();}}else if(err)err();}};x.send();}
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function setCat(c,el){
  cat=c;
  var cs=document.getElementById('chips').getElementsByTagName('span');
  for(var i=0;i<cs.length;i++)cs[i].className='chip';
  el.className='chip on';
  filter();
}
function buildChips(){
  var seen={};var html='<span class="chip on" onclick="setCat(\'all\',this)">All</span>';
  for(var i=0;i<data.length;i++){if(data[i].category&&!seen[data[i].category]){seen[data[i].category]=1;html+='<span class="chip" onclick="setCat(\''+esc(data[i].category)+'\',this)">'+esc(data[i].category)+'</span>';}}
  document.getElementById('chips').innerHTML=html;
}
function filter(){
  var q=(document.getElementById('q').value||'').toLowerCase().trim();
  var res=data.filter(function(a){
    var mc=cat==='all'||a.category===cat;
    var mq=!q||a.name.toLowerCase().indexOf(q)>=0||(a.desc&&a.desc.toLowerCase().indexOf(q)>=0)||(a.category&&a.category.toLowerCase().indexOf(q)>=0);
    return mc&&mq;
  });
  render(res);
}
function render(list){
  var el=document.getElementById('list');
  if(!list.length){el.innerHTML='<div class="empty">Nothing found</div>';return;}
  var h='';
  for(var i=0;i<list.length;i++){
    var a=list[i];
    var ver=a.version||a.ver||'?';
    var hasApk=a.apk&&a.apk!=='#';
    var hasLink=a.link&&a.link!=='#';
    var dUrl='app-detail.html?name='+encodeURIComponent(a.name)+'&type=app';
    h+='<div class="app-row" onclick="location.href=\''+dUrl+'\'">'
      +'<div class="app-icon"><img src="images/'+(a.image||'')+'" alt="" onerror="this.parentNode.innerHTML=\'APK\'"></div>'
      +'<div class="app-info">'
        +'<div class="app-name">'+esc(a.name)+'<span class="app-cat">'+esc(a.category||'')+'</span></div>'
        +'<div class="app-desc">'+esc(a.desc||'')+'</div>'
        +'<div class="app-meta">v'+esc(ver)+(a.android?' &nbsp;&#183;&nbsp; '+esc(a.android):'')+'</div>'
      +'</div>'
      +(hasApk
        ?'<a href="'+esc(a.apk)+'" download class="btn-dl" onclick="event.stopPropagation()" title="Download APK">&#8659;</a>'
        :(hasLink?'<a href="'+esc(a.link)+'" target="_blank" class="btn-dl-ghost" onclick="event.stopPropagation()">GET</a>':'<span class="btn-dead">N/A</span>'))
      +'</div>';
  }
  el.innerHTML=h;
  document.getElementById('status').textContent='Showing '+list.length+' of '+data.length+' apps';
}
get('apps.json',function(d){
  data=d;buildChips();render(d);
  document.getElementById('status').textContent=d.length+' apps in archive';
},function(){
  document.getElementById('list').innerHTML='<div class="empty empty-err">Cannot load apps.json</div>';
  document.getElementById('status').textContent='Offline';
});
</script>
</body>
</html>
