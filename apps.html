<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apps | Legacy Droid</title>
<style>
body{background:#000;color:#fff;font-family:Arial,Helvetica,sans-serif;margin:0;padding:0;}
*{-webkit-box-sizing:border-box;box-sizing:border-box;}
.action-bar{background:#000;height:56px;display:-webkit-box;display:flex;-webkit-box-align:center;align-items:center;padding:0 16px;border-bottom:2px solid #33b5e5;position:sticky;top:0;z-index:100;}
nav{display:-webkit-box;display:flex;background:#000;border-bottom:1px solid #333;overflow-x:auto;-webkit-overflow-scrolling:touch;}
nav a{-webkit-box-flex:1;flex:1;min-width:65px;text-align:center;padding:13px 5px;color:#fff;text-decoration:none;font-size:11px;text-transform:uppercase;white-space:nowrap;border-bottom:3px solid transparent;}
nav a:hover{color:#33b5e5;}
nav a.active{border-bottom:3px solid #33b5e5;color:#33b5e5;}

.search-area{padding:10px;background:#111;border-bottom:1px solid #333;}
#search{width:100%;padding:10px 12px;background:#000;border:1px solid #33b5e5;color:#fff;font-size:14px;outline:none;}
#search:focus{border-color:#fff;}

.filter-bar{padding:6px 10px;background:#0a0a0a;border-bottom:1px solid #222;overflow-x:auto;white-space:nowrap;-webkit-overflow-scrolling:touch;}
.filter-btn{display:inline-block;padding:4px 10px;margin-right:6px;font-size:11px;color:#888;border:1px solid #333;cursor:pointer;background:transparent;text-transform:uppercase;}
.filter-btn.on{color:#33b5e5;border-color:#33b5e5;}

.status{font-size:11px;color:#555;padding:6px 12px;background:#050505;}

.content{padding:10px;}
.app-card{display:-webkit-box;display:flex;-webkit-box-align:center;align-items:center;background:#0a0a0a;border:1px solid #222;margin-bottom:6px;padding:10px;}
.app-card:hover{border-color:#33b5e5;}
.app-icon{width:48px;height:48px;min-width:48px;background:#111;border:1px solid #2a2a2a;margin-right:12px;display:-webkit-box;display:flex;-webkit-box-align:center;align-items:center;-webkit-box-pack:center;justify-content:center;font-size:10px;color:#555;text-align:center;overflow:hidden;}
.app-icon img{width:48px;height:48px;object-fit:contain;}
.app-info{-webkit-box-flex:1;flex:1;min-width:0;}
.app-name{color:#33b5e5;font-weight:bold;font-size:14px;}
.app-desc{color:#888;font-size:11px;margin:2px 0 4px;}
.app-meta{font-size:10px;color:#555;}
.dl-btn{display:inline-block;background:transparent;border:1px solid #33b5e5;color:#33b5e5;padding:6px 12px;text-decoration:none;font-size:12px;white-space:nowrap;margin-left:10px;cursor:pointer;}
.dl-btn:hover{background:#33b5e5;color:#000;}
.empty{text-align:center;padding:40px;color:#555;font-style:italic;}
footer{background:#080808;padding:16px;border-top:2px solid #33b5e5;margin-top:16px;}
a{color:#33b5e5;text-decoration:none;}

@media(max-width:380px){
  .dl-btn{padding:5px 8px;font-size:11px;}
  .app-name{font-size:13px;}
}
</style>
</head>
<body>

<div class="action-bar"><h1 style="font-size:18px;font-weight:300;margin:0;letter-spacing:1px;">APP REPOSITORY</h1></div>
<nav>
  <a href="index.html">Home</a>
  <a href="catalog.html">Devices</a>
  <a href="software.html">Software</a>
  <a href="apps.html" class="active">Apps</a>
  <a href="games.html">Games</a>
</nav>

<div class="search-area">
  <input type="text" id="search" placeholder="Search APK archive..." oninput="doFilter()" onkeyup="doFilter()">
</div>
<div class="filter-bar" id="filter-bar">
  <span class="filter-btn on" onclick="setCategory('all',this)">ALL</span>
</div>
<div class="status" id="status">Loading...</div>

<div class="content" id="app-list"><div class="empty">Connecting to APK database...</div></div>

<footer>
  <p style="margin:4px 0;font-size:13px;">Support: <a href="https://t.me/Exynos2600">@Exynos2600</a> &nbsp;|&nbsp; <a href="https://t.me/LegacyDroid">t.me/LegacyDroid</a></p>
  <p style="font-size:11px;opacity:0.5;margin:6px 0 0;">Legacy Droid &copy; 2026</p>
</footer>

<script>
var appData = [];
var activeCategory = 'all';

function getData(url, cb, errCb) {
  if (window.fetch) {
    fetch(url).then(function(r){ if(!r.ok) throw 0; return r.json(); }).then(cb).catch(errCb||function(){});
  } else {
    var xhr = new XMLHttpRequest();
    xhr.open('GET', url, true);
    xhr.onreadystatechange = function(){
      if(xhr.readyState===4){
        if(xhr.status===200){ try{cb(JSON.parse(xhr.responseText));}catch(e){if(errCb)errCb();} }
        else { if(errCb) errCb(); }
      }
    };
    xhr.send();
  }
}

function buildCategories(data) {
  var cats = {};
  for(var i=0;i<data.length;i++) if(data[i].category) cats[data[i].category]=1;
  var bar = document.getElementById('filter-bar');
  var html = '<span class="filter-btn on" onclick="setCategory(\'all\',this)">ALL</span>';
  for(var c in cats) html += '<span class="filter-btn" onclick="setCategory(\''+c+'\',this)">'+c+'</span>';
  bar.innerHTML = html;
}

function setCategory(cat, el) {
  activeCategory = cat;
  var btns = document.getElementById('filter-bar').getElementsByTagName('span');
  for(var i=0;i<btns.length;i++) btns[i].className='filter-btn';
  el.className='filter-btn on';
  doFilter();
}

function doFilter() {
  var q = (document.getElementById('search').value||'').toLowerCase();
  var list = appData.filter(function(a){
    var matchQ = !q || a.name.toLowerCase().indexOf(q)>=0 || (a.desc&&a.desc.toLowerCase().indexOf(q)>=0);
    var matchC = activeCategory==='all' || a.category===activeCategory;
    return matchQ && matchC;
  });
  renderApps(list);
}

function renderApps(list) {
  var c = document.getElementById('app-list');
  if(list.length===0){ c.innerHTML='<div class="empty">Nothing found</div>'; return; }
  var html = '';
  for(var i=0;i<list.length;i++){
    var a = list[i];
    var ver = a.version||a.ver||'?';
    var hasLink = a.link && a.link!=='#';
    html += '<div class="app-card" onclick="location.href=\'app-detail.html?name='+encodeURIComponent(a.name)+'&type=app\'" style="cursor:pointer;">' +
      '<div class="app-icon"><img src="images/'+a.image+'" alt="" onerror="this.parentNode.innerHTML=\'APK\'"></div>' +
      '<div class="app-info">' +
        '<div class="app-name">'+a.name+'</div>' +
        '<div class="app-desc">'+a.desc+'</div>' +
        '<div class="app-meta">v'+ver+(a.android?' | '+a.android:'')+(a.category?' | '+a.category:'')+'</div>' +
      '</div>' +
      (hasLink ? '<a href="'+a.link+'" target="_blank" class="dl-btn" onclick="event.stopPropagation()">GET</a>' : '<span class="dl-btn" style="opacity:0.3;cursor:default;">GET</span>') +
    '</div>';
  }
  c.innerHTML = html;
  document.getElementById('status').innerHTML = 'Showing '+list.length+' of '+appData.length+' apps';
}

getData('apps.json', function(data){
  appData = data;
  buildCategories(data);
  renderApps(data);
  document.getElementById('status').innerHTML = appData.length+' apps in archive';
}, function(){
  document.getElementById('app-list').innerHTML='<div class="empty" style="color:#c00;">Could not load apps.json<br><small>Make sure the file exists next to apps.html</small></div>';
  document.getElementById('status').innerHTML='Offline';
});
</script>
</body>
</html>
