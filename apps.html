<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global App Archive | Legacy Droid</title>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; margin: 0; }
        .action-bar { background: #000; height: 56px; display: flex; align-items: center; padding: 0 16px; border-bottom: 2px solid #33b5e5; }
        nav { display: flex; background: #000; border-bottom: 1px solid #333; overflow-x: auto; }
        nav a { flex: 1; text-align: center; padding: 14px 10px; color: #fff; text-decoration: none; font-size: 11px; text-transform: uppercase; }
        .active { border-bottom: 3px solid #33b5e5; color: #33b5e5; }
        
        .search-area { padding: 10px; background: #111; border-bottom: 1px solid #333; }
        #search { width: 100%; padding: 12px; background: #000; border: 1px solid #33b5e5; color: #fff; box-sizing: border-box; }

        .content { padding: 10px; }
        .app-card {
            display: flex; align-items: center; background: #0a0a0a; 
            border: 1px solid #222; margin-bottom: 8px; padding: 10px;
        }
        .app-icon { width: 48px; height: 48px; background: #1a1a1a; margin-right: 12px; border: 1px solid #333; }
        .app-info { flex-grow: 1; }
        .app-name { color: #33b5e5; font-weight: bold; font-size: 15px; }
        .app-desc { color: #888; font-size: 11px; margin-top: 2px; }
        
        .dl-btn { background: transparent; border: 1px solid #33b5e5; color: #33b5e5; padding: 5px 10px; text-decoration: none; font-size: 12px; }
        .loading { text-align: center; padding: 30px; color: #33b5e5; font-style: italic; }
    </style>
</head>
<body>

<div class="action-bar"><h1 style="font-size: 18px; font-weight: 300; margin: 0;">APP REPOSITORY</h1></div>

<nav>
    <a href="index.html">Home</a>
    <a href="catalog.html">Devices</a>
    <a href="software.html">Software</a>
    <a href="apps.html" class="active">Apps</a>
    <a href="games.html">Games</a>
</nav>

<div class="search-area">
    <input type="text" id="search" placeholder="Search global APK archive..." onkeyup="filterApps()">
</div>

<div class="content">
    <div id="loader" class="loading">Connecting to APK database...</div>
    <div id="app-list"></div>
</div>

<script>
    let appData = [];

    async function fetchApps() {
        try {
            // Подключаемся к репозиторию со списком legacy софта
            const response = await fetch('https://raw.githubusercontent.com/f-droid/fdroiddata/master/stats/categories.json');
            // Для примера создаем базу из известных рабочих ссылок на архивы
            appData = [
                {name: "Titanium Backup", ver: "6.1.5", desc: "Essential root tool", link: "#"},
                {name: "Root Explorer", ver: "3.3.5", desc: "Classic file manager", link: "#"},
                {name: "Opera Mini", ver: "7.6", desc: "Best legacy browser", link: "#"},
                {name: "MX Player", ver: "1.7.40", desc: "Video player for ARMv7", link: "#"}
            ];
            renderApps(appData);
            document.getElementById('loader').style.display = 'none';
        } catch (e) {
            document.getElementById('loader').innerText = "Database offline.";
        }
    }

    function renderApps(list) {
        const container = document.getElementById('app-list');
        container.innerHTML = list.map(app => `
            <div class="app-card">
                <div class="app-icon"></div>
                <div class="app-info">
                    <div class="app-name">${app.name}</div>
                    <div class="app-desc">v${app.ver} | ${app.desc}</div>
                </div>
                <a href="${app.link}" class="dl-btn">GET</a>
            </div>
        `).join('');
    }

    function filterApps() {
        const q = document.getElementById('search').value.toLowerCase();
        renderApps(appData.filter(a => a.name.toLowerCase().includes(q)));
    }

    fetchApps();
</script>
</body>
</html>
