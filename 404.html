<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 Not Found | Legacy Droid</title>
<style>
body{background:#000;color:#fff;font-family:Arial,Helvetica,sans-serif;margin:0;padding:0;min-height:100vh;display:-webkit-box;display:flex;-webkit-box-orient:vertical;flex-direction:column;}
.action-bar{background:#000;height:56px;display:-webkit-box;display:flex;-webkit-box-align:center;align-items:center;padding:0 16px;border-bottom:2px solid #33b5e5;}
nav{display:-webkit-box;display:flex;background:#000;border-bottom:1px solid #333;overflow-x:auto;}
nav a{-webkit-box-flex:1;flex:1;min-width:65px;text-align:center;padding:13px 5px;color:#fff;text-decoration:none;font-size:11px;text-transform:uppercase;white-space:nowrap;border-bottom:3px solid transparent;}
nav a:hover{color:#33b5e5;}
.center{-webkit-box-flex:1;flex:1;display:-webkit-box;display:flex;-webkit-box-align:center;align-items:center;-webkit-box-pack:center;justify-content:center;-webkit-box-orient:vertical;flex-direction:column;text-align:center;padding:40px 20px;}
.err-code{font-size:72px;font-weight:bold;color:#33b5e5;line-height:1;font-family:monospace;margin-bottom:8px;}
.err-msg{font-size:16px;color:#888;margin-bottom:24px;}
.err-sub{font-size:12px;color:#444;margin-bottom:32px;font-family:monospace;}
.btn-home{display:inline-block;background:#33b5e5;color:#000;padding:10px 24px;font-weight:bold;font-size:13px;text-decoration:none;text-transform:uppercase;}
.btn-home:hover{background:#fff;}
a{color:#33b5e5;text-decoration:none;}
</style>
</head>
<body>
<div class="action-bar"><h1 style="font-size:18px;font-weight:300;margin:0;">LEGACY DROID</h1></div>
<nav>
  <a href="index.html">Home</a>
  <a href="catalog.html">Devices</a>
  <a href="software.html">Software</a>
  <a href="apps.html">Apps</a>
  <a href="games.html">Games</a>
</nav>
<div class="center">
  <div class="err-code">404</div>
  <div class="err-msg">Page Not Found</div>
  <div class="err-sub" id="path-display"></div>
  <a href="index.html" class="btn-home">Go to Home</a>
</div>
<script>
var p = window.location.pathname;
var el = document.getElementById('path-display');
if(el && p) el.textContent = 'Requested: '+p;
</script>
</body>
</html>
