<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legacy Droid | v26.1.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        /* Цвета без переменных для макс. совместимости */
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Roboto', sans-serif;
            margin: 0; padding: 0;
        }

        /* Action Bar */
        .action-bar {
            background-color: #000000;
            height: 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 16px;
            border-bottom: 2px solid #33b5e5;
        }

        .version-tag {
            color: #33b5e5;
            font-size: 11px;
            border: 1px solid #33b5e5;
            padding: 2px 6px;
        }

        /* Nav */
        nav {
            display: flex;
            background-color: #000000;
            border-bottom: 1px solid #333333;
            overflow-x: auto;
        }

        nav a {
            flex: 1; min-width: 90px;
            text-align: center;
            padding: 14px 5px;
            color: #ffffff;
            text-decoration: none;
            font-size: 12px;
            text-transform: uppercase;
        }

        .active { border-bottom: 3px solid #33b5e5; color: #33b5e5; }

        /* Content */
        .content { padding: 15px; }

        /* Banner System */
        #ad-container {
            margin-bottom: 20px;
            border: 1px dashed #33b5e5;
            padding: 10px;
            text-align: center;
        }
        #ad-container img { max-width: 100%; height: auto; display: block; margin: 0 auto; }

        /* Blocks */
        .section-header {
            color: #33b5e5;
            font-size: 14px;
            text-transform: uppercase;
            border-bottom: 1px solid #333333;
            margin: 15px 0 10px 0;
            padding-bottom: 4px;
        }

        .board-container {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }

        .board-box {
            flex: 1;
            min-width: 280px;
            background: #0a0a0a;
            border: 1px solid #333333;
            padding: 10px;
        }

        .list-item { margin-bottom: 8px; font-size: 14px; border-bottom: 1px solid #1a1a1a; padding-bottom: 4px; }

        footer {
            background: #080808;
            padding: 20px;
            border-top: 2px solid #33b5e5;
            margin-top: 30px;
        }

        a { color: #33b5e5; text-decoration: none; }
    </style>
</head>
<body>

<div class="action-bar">
    <h1 style="font-size: 20px; font-weight: 300; margin: 0;">LEGACY DROID</h1>
    <span class="version-tag">v26.1.0</span>
</div>

<nav>
    <a href="index.html" class="active">Home</a>
    <a href="catalog.html">Devices</a>
    <a href="software.html">Software</a>
    <a href="apps.html">Apps</a>
    <a href="games.html">Games</a>
</nav>

<div class="content">
    <div id="welcome-msg">
        <h2 style="font-weight: 300; color: #33b5e5;">Hello, Guest!</h2>
    </div>

    <div id="ad-container">Loading promotion...</div>

    <div class="board-container">
        <div class="board-box">
            <div class="section-header">Bulletin Board</div>
            <div id="news-list"><p>Loading...</p></div>
        </div>

        <div class="board-box">
            <div class="section-header">Updates</div>
            <div id="updates-list"><p>Loading...</p></div>
        </div>
    </div>
</div>

<footer>
    <div class="section-header">Support</div>
    <p>Support: <a href="https://t.me/Exynos2600">@Exynos2600</a></p>
    <p>Telegram: <a href="https://t.me/LegacyDroid">t.me/LegacyDroid</a></p>
    <p style="font-size: 12px; opacity: 0.6;">Dev: Workstation5495</p>
</footer>

<script>
    // Загрузка баннера
    fetch('banner.json').then(r => r.json()).then(data => {
        const container = document.getElementById('ad-container');
        container.innerHTML = `<a href="${data.link}"><img src="${data.image_name}" alt="Ad"></a><br><small>Ad: ${data.text}</small>`;
    }).catch(e => {
        document.getElementById('ad-container').innerHTML = 'Contact @Exynos2600 for ads';
    });

    // Загрузка новостей
    fetch('news.json').then(r => r.json()).then(data => {
        const list = document.getElementById('news-list');
        list.innerHTML = data.map(item => `<div class="list-item">${item}</div>`).join('');
    });

    // Загрузка обновлений
    fetch('update.json').then(r => r.json()).then(data => {
        const list = document.getElementById('updates-list');
        list.innerHTML = data.map(item => `<div class="list-item">${item}</div>`).join('');
    });
</script>

</body>
</html>
