<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>Legacy Droid Store</title>
<link rel="stylesheet" href="holo.css">
</head>
<body>

<div class="ab">
  <h1 class="ab-title">LEGACY DROID</h1>
  <span class="ab-meta">v26.1.0</span>
</div>

<nav class="nav">
  <a href="index.html" class="on">Home</a>
  <a href="catalog.html">Devices</a>
  <a href="software.html">Software</a>
  <a href="apps.html">Apps</a>
  <a href="games.html">Games</a>
</nav>

<div class="content">
  <div id="adbox" class="adbox"><div style="padding:14px;color:#333;font-size:12px;text-align:center;">Loading...</div></div>

  <div class="stats">
    <div class="stat"><div class="stat-n" id="sn-apps">—</div><div class="stat-l">Apps</div></div>
    <div class="stat"><div class="stat-n" id="sn-games">—</div><div class="stat-l">Games</div></div>
    <div class="stat"><div class="stat-n">200+</div><div class="stat-l">Devices</div></div>
    <div class="stat"><div class="stat-n">5</div><div class="stat-l">Sections</div></div>
  </div>

  <div class="qlinks">
    <a href="apps.html" class="qlink">&#128196; Apps</a>
    <a href="games.html" class="qlink">&#127918; Games</a>
    <a href="catalog.html" class="qlink">&#128241; Devices</a>
    <a href="software.html" class="qlink">&#128190; Software</a>
  </div>

  <div class="sh">Choice of the Day</div>
  <div id="pick" class="pick">
    <div class="pick-inner">
      <div class="pick-ico">&#9733;</div>
      <div><div class="pick-name">Loading...</div></div>
    </div>
  </div>

  <div class="boards">
    <div class="board">
      <div class="board-hd">Bulletin Board</div>
      <div class="board-body" id="news"><div class="board-item" style="color:#444;">Loading...</div></div>
    </div>
    <div class="board">
      <div class="board-hd">Updates</div>
      <div class="board-body" id="updates"><div class="board-item" style="color:#444;">Loading...</div></div>
    </div>
  </div>
</div>

<footer>
  <p>Support: <a href="https://t.me/Exynos2600">@Exynos2600</a> &nbsp;&#183;&nbsp; <a href="https://t.me/LegacyDroid">t.me/LegacyDroid</a></p>
  <p style="opacity:.4;font-size:11px;margin-top:8px;">Legacy Droid &copy; 2026 &nbsp;&#183;&nbsp; Holo UI</p>
</footer>

<script>
function get(url,cb,err){
  if(window.fetch){fetch(url).then(function(r){if(!r.ok)throw 0;return r.json();}).then(cb).catch(err||function(){});}
  else{var x=new XMLHttpRequest();x.open('GET',url,true);x.onreadystatechange=function(){if(x.readyState===4){if(x.status===200){try{cb(JSON.parse(x.responseText));}catch(e){if(err)err();}}else if(err)err();}};x.send();}
}
// Banner
get('banner.json',function(d){
  var el=document.getElementById('adbox');
  el.innerHTML=(d.image_name?'<a href="'+d.link+'" target="_blank"><img src="'+d.image_name+'" alt="Ad"></a>':'')
    +'<div class="adbox-text"><a href="'+d.link+'" target="_blank">'+d.text+'</a></div>';
},function(){document.getElementById('adbox').innerHTML='<div class="adbox-text"><a href="https://t.me/Exynos2600">Contact @Exynos2600 for advertising</a></div>';});
// News
get('news.json',function(d){
  document.getElementById('news').innerHTML=d.map(function(s){return'<div class="board-item">'+s+'</div>';}).join('');
},function(){document.getElementById('news').innerHTML='<div class="board-item" style="color:#333;">Unavailable</div>';});
// Updates
get('update.json',function(d){
  document.getElementById('updates').innerHTML=d.map(function(s){return'<div class="board-item">'+s+'</div>';}).join('');
},function(){document.getElementById('updates').innerHTML='<div class="board-item" style="color:#333;">Unavailable</div>';});
// Stats + Daily Pick
var pool=[],loaded=0;
function gotData(d,type){
  pool=pool.concat(d);
  if(type==='app'){var e=document.getElementById('sn-apps');if(e)e.textContent=d.length;}
  if(type==='game'){var e=document.getElementById('sn-games');if(e)e.textContent=d.length;}
  loaded++;if(loaded<2)return;
  if(!pool.length){document.getElementById('pick').innerHTML='<div class="pick-inner"><div class="pick-ico">?</div><div><div class="pick-name" style="color:#444;">No data</div></div></div>';return;}
  var item=pool[new Date().getDate()%pool.length];
  var type2=item.category?'app':'game';
  var dUrl='app-detail.html?name='+encodeURIComponent(item.name)+'&type='+type2;
  document.getElementById('pick').onclick=function(){location.href=dUrl;};
  document.getElementById('pick').innerHTML=
    '<div class="pick-inner">'
    +'<div class="pick-ico">&#9733;</div>'
    +'<div>'
    +'<div class="pick-name">'+item.name+'</div>'
    +'<div class="pick-meta">v'+(item.version||'?')+' &nbsp;&#183;&nbsp; '+(item.android||item.category||'Legacy')+'</div>'
    +'<div style="margin-top:5px;"><a href="'+dUrl+'" class="pick-link" onclick="event.stopPropagation()">Details &#8594;</a>'
    +(item.apk&&item.apk!=='#'?' &nbsp; <a href="'+item.apk+'" download class="pick-link" onclick="event.stopPropagation()">Download &#8659;</a>':'')
    +'</div></div></div>';
}
get('apps.json',function(d){gotData(d,'app');},function(){loaded++;});
get('games.json',function(d){gotData(d,'game');},function(){loaded++;});
</script>
</body>
</html>
