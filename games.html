<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>Games | Legacy Droid</title>
<link rel="stylesheet" href="holo.css">
</head>
<body>

<div class="ab">
  <h1 class="ab-title">GAMES ARCHIVE</h1>
  <span class="ab-meta">APK</span>
</div>

<nav class="nav">
  <a href="index.html">Home</a>
  <a href="catalog.html">Devices</a>
  <a href="software.html">Software</a>
  <a href="apps.html">Apps</a>
  <a href="games.html" class="on">Games</a>
</nav>

<div class="search-wrap">
  <input class="search-input" type="text" id="q" placeholder="Search games..." oninput="filter()" onkeyup="filter()">
</div>
<div class="chips" id="chips"><span class="chip on" onclick="setCat('all',this)">All</span></div>
<div class="status" id="status">Loading...</div>

<div class="game-grid" id="grid"><div class="empty" style="width:100%">Loading games...</div></div>

<footer>
  <p>Support: <a href="https://t.me/Exynos2600">@Exynos2600</a> &nbsp;&#183;&nbsp; <a href="https://t.me/LegacyDroid">t.me/LegacyDroid</a></p>
  <p style="opacity:.4;font-size:11px;margin-top:6px;">Legacy Droid &copy; 2026</p>
</footer>

<script>
var data=[],cat='all';
function get(url,cb,err){
  if(window.fetch){fetch(url).then(function(r){if(!r.ok)throw 0;return r.json();}).then(cb).catch(err||function(){});}
  else{var x=new XMLHttpRequest();x.open('GET',url,true);x.onreadystatechange=function(){if(x.readyState===4){if(x.status===200){try{cb(JSON.parse(x.responseText));}catch(e){if(err)err();}}else if(err)err();}};x.send();}
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function setCat(c,el){
  cat=c;
  var cs=document.getElementById('chips').getElementsByTagName('span');
  for(var i=0;i<cs.length;i++)cs[i].className='chip';
  el.className='chip on';
  filter();
}
function buildChips(){
  var seen={};var html='<span class="chip on" onclick="setCat(\'all\',this)">All</span>';
  for(var i=0;i<data.length;i++){if(data[i].category&&!seen[data[i].category]){seen[data[i].category]=1;html+='<span class="chip" onclick="setCat(\''+esc(data[i].category)+'\',this)">'+esc(data[i].category)+'</span>';}}
  document.getElementById('chips').innerHTML=html;
}
function filter(){
  var q=(document.getElementById('q').value||'').toLowerCase().trim();
  var res=data.filter(function(g){
    var mc=cat==='all'||g.category===cat;
    var mq=!q||g.name.toLowerCase().indexOf(q)>=0||(g.category&&g.category.toLowerCase().indexOf(q)>=0);
    return mc&&mq;
  });
  render(res);
}
function render(list){
  var el=document.getElementById('grid');
  if(!list.length){el.innerHTML='<div class="empty" style="width:100%">Nothing found</div>';return;}
  var h='';
  for(var i=0;i<list.length;i++){
    var g=list[i];
    var hasApk=g.apk&&g.apk!=='#';
    var hasLink=g.link&&g.link!=='#';
    var dUrl='app-detail.html?name='+encodeURIComponent(g.name)+'&type=game';
    h+='<div class="game-card" onclick="location.href=\''+dUrl+'\'">'
      +'<div class="game-thumb"><img src="images/'+(g.image||'')+'" alt="'+esc(g.name)+'" onerror="this.parentNode.innerHTML=\'NO IMG\'"></div>'
      +'<div class="game-body">'
        +'<div class="game-name">'+esc(g.name)+'</div>'
        +'<div class="game-meta">'+esc(g.android||'Legacy')+(g.version?' &bull; v'+esc(g.version):'')+(g.category?' &bull; '+esc(g.category):'')+'</div>'
      +'</div>'
      +(hasApk
        ?'<a href="'+esc(g.apk)+'" download class="game-dl" onclick="event.stopPropagation()">&#8659; Download APK</a>'
        :(hasLink?'<a href="'+esc(g.link)+'" target="_blank" class="game-dl" onclick="event.stopPropagation()">Get APK</a>':'<span class="game-dl-dead">No link</span>'))
      +'</div>';
  }
  el.innerHTML=h;
  document.getElementById('status').textContent='Showing '+list.length+' of '+data.length+' games';
}
get('games.json',function(d){
  data=d;buildChips();render(d);
  document.getElementById('status').textContent=d.length+' games in archive';
},function(){
  document.getElementById('grid').innerHTML='<div class="empty empty-err" style="width:100%">Cannot load games.json</div>';
  document.getElementById('status').textContent='Offline';
});
</script>
</body>
</html>
