<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Games | Legacy Droid</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; }
        .action-bar { height: 56px; display: flex; align-items: center; padding: 0 16px; border-bottom: 2px solid #33b5e5; }
        nav { display: flex; border-bottom: 1px solid #333; }
        nav a { flex: 1; text-align: center; padding: 14px 0; color: #fff; text-decoration: none; font-size: 12px; text-transform: uppercase; }
        .active { border-bottom: 3px solid #33b5e5; color: #33b5e5; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
        .card { background: #0a0a0a; border: 1px solid #333; text-align: center; overflow: hidden; }
        .card img { width: 100%; height: 110px; object-fit: cover; background: #222; }
        .title { padding: 8px; font-size: 13px; font-weight: bold; color: #33b5e5; }
        .dl { display: block; background: #33b5e5; color: #000; padding: 10px; text-decoration: none; font-weight: bold; font-size: 11px; }
    </style>
</head>
<body>

<div class="action-bar"><b style="font-size: 18px;">GAMES ARCHIVE</b></div>

<nav>
    <a href="index.html">Home</a>
    <a href="catalog.html">Devices</a>
    <a href="software.html">Software</a>
    <a href="apps.html">Apps</a>
    <a href="games.html" class="active">Games</a>
</nav>

<div class="grid" id="grid">
    </div>

<script>
    fetch('games.json')
        .then(res => res.json())
        .then(data => {
            document.getElementById('grid').innerHTML = data.map(g => `
                <div class="card">
                    <img src="images/${g.image}" onerror="this.src='https://via.placeholder.com/150/222/33b5e5?text=GAME'">
                    <div class="title">${g.name}</div>
                    <a href="${g.link}" class="dl">DOWNLOAD</a>
                </div>
            `).join('');
        })
        .catch(err => {
            document.getElementById('grid').innerHTML = `<p style="color:red">Создай games.json!</p>`;
        });
</script>
</body>
</html>
