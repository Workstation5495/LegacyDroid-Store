<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Game Archive | Legacy Droid</title>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; margin: 0; }
        .action-bar { background: #000; height: 56px; display: flex; align-items: center; padding: 0 16px; border-bottom: 2px solid #33b5e5; }
        nav { display: flex; background: #000; border-bottom: 1px solid #333; overflow-x: auto; }
        nav a { flex: 1; text-align: center; padding: 14px 10px; color: #fff; text-decoration: none; font-size: 11px; text-transform: uppercase; }
        .active { border-bottom: 3px solid #33b5e5; color: #33b5e5; }

        .search-area { padding: 10px; background: #111; }
        #search { width: 100%; padding: 12px; background: #000; border: 1px solid #33b5e5; color: #fff; }

        .game-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
        .game-card { background: #0a0a0a; border: 1px solid #333; padding: 10px; text-align: center; }
        .game-thumb { width: 100%; height: 80px; background: #1a1a1a; margin-bottom: 8px; border: 1px solid #222; }
        .game-title { color: #33b5e5; font-size: 13px; font-weight: bold; height: 32px; overflow: hidden; }
        .dl-link { display: block; margin-top: 8px; font-size: 11px; color: #fff; border: 1px solid #33b5e5; padding: 4px; text-decoration: none; }
    </style>
</head>
<body>

<div class="action-bar"><h1 style="font-size: 18px; font-weight: 300; margin: 0;">GAME REPOSITORY</h1></div>

<nav>
    <a href="index.html">Home</a>
    <a href="catalog.html">Devices</a>
    <a href="software.html">Software</a>
    <a href="apps.html">Apps</a>
    <a href="games.html" class="active">Games</a>
</nav>

<div class="search-area">
    <input type="text" id="search" placeholder="Search classic games..." onkeyup="filterGames()">
</div>

<div class="game-grid" id="game-list">
    </div>

<script>
    let gameData = [
        {name: "Angry Birds Classic", link: "#"},
        {name: "GTA Vice City", link: "#"},
        {name: "Temple Run", link: "#"},
        {name: "Dead Space Mobile", link: "#"},
        {name: "N.O.V.A. 3", link: "#"},
        {name: "Minecraft PE 0.8.1", link: "#"}
    ];

    function renderGames(list) {
        const container = document.getElementById('game-list');
        container.innerHTML = list.map(game => `
            <div class="game-card">
                <div class="game-thumb"></div>
                <div class="game-title">${game.name}</div>
                <a href="${game.link}" class="dl-link">DOWNLOAD</a>
            </div>
        `).join('');
    }

    function filterGames() {
        const q = document.getElementById('search').value.toLowerCase();
        renderGames(gameData.filter(g => g.name.toLowerCase().includes(q)));
    }

    renderGames(gameData);
</script>
</body>
</html>
